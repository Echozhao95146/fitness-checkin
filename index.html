<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>为歪马健康工作30年 · 运动挑战</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f0f4f8; min-height: 100vh; }

  .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 16px 30px; text-align: center; }
  .header h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; opacity: 0.85; }

  .week-card { background: white; margin: -16px 16px 16px; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .week-title { font-size: 13px; color: #888; margin-bottom: 10px; }
  .week-range { font-size: 15px; font-weight: 600; color: #333; }

  .nav { display: flex; background: white; border-bottom: 1px solid #eee; }
  .nav-item { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .nav-item.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* 打卡页 */
  .user-select { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .user-select h3 { font-size: 14px; color: #666; margin-bottom: 12px; }
  .user-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .user-btn { padding: 10px 4px; border: 2px solid #e8e8e8; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; transition: all .2s; text-align: center; }
  .user-btn.selected { border-color: #667eea; background: #f0edff; color: #667eea; font-weight: 600; }

  .checkin-area { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .checkin-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-top: 12px; }
  .checkin-btn:disabled { opacity: 0.4; }
  .checkin-btn:active { opacity: 0.85; }

  .today-status { margin-top: 12px; font-size: 13px; color: #888; text-align: center; }
  .done-badge { display: inline-block; background: #e8f5e9; color: #4caf50; padding: 4px 12px; border-radius: 20px; font-size: 13px; }

  .motivation { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; text-align: center; font-size: 14px; line-height: 1.6; display: none; }

  /* 本周进度 */
  .progress-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .progress-card h3 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
  .member-row { display: flex; align-items: center; margin-bottom: 10px; }
  .member-name { width: 48px; font-size: 13px; color: #555; flex-shrink: 0; }
  .progress-bar-wrap { flex: 1; background: #f0f0f0; border-radius: 10px; height: 8px; margin: 0 10px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width .4s; }
  .progress-count { font-size: 12px; color: #888; width: 36px; text-align: right; flex-shrink: 0; }
  .progress-count.done { color: #4caf50; font-weight: 600; }

  /* 排行榜 */
  .rank-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .rank-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
  .rank-item:last-child { border-bottom: none; }
  .rank-no { width: 28px; font-size: 16px; font-weight: 700; color: #ccc; flex-shrink: 0; }
  .rank-no.gold { color: #ffd700; }
  .rank-no.silver { color: #c0c0c0; }
  .rank-no.bronze { color: #cd7f32; }
  .rank-name { flex: 1; font-size: 14px; color: #333; }
  .rank-streak { font-size: 12px; color: #888; margin-right: 8px; }
  .rank-total { font-size: 15px; font-weight: 700; color: #667eea; }

  /* 个人记录 */
  .my-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .my-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-box { text-align: center; background: #f8f6ff; border-radius: 10px; padding: 12px 8px; }
  .stat-num { font-size: 22px; font-weight: 700; color: #667eea; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-header { text-align: center; font-size: 11px; color: #aaa; padding: 2px 0; }
  .cal-day { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; background: #f5f5f5; color: #ccc; }
  .cal-day.checked { background: #667eea; color: white; font-weight: 600; }
  .cal-day.today { border: 2px solid #667eea; color: #667eea; background: white; }
  .cal-day.today.checked { background: #667eea; color: white; border-color: #4a5fe0; }
  .cal-day.empty { background: transparent; }

  .section-title { font-size: 13px; color: #888; margin-bottom: 10px; font-weight: 600; }

  /* toast */
  .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 999; text-align: center; }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  .empty-tip { text-align: center; color: #ccc; font-size: 14px; padding: 30px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>🏃 为歪马健康工作30年</h1>
  <p>运动挑战 · 每周4次，坚持到底</p>
</div>

<div class="week-card">
  <div class="week-title">本挑战周</div>
  <div class="week-range" id="weekRange">加载中...</div>
</div>

<div class="nav">
  <div class="nav-item active" onclick="switchPage('checkin')">打卡</div>
  <div class="nav-item" onclick="switchPage('progress')">本周进度</div>
  <div class="nav-item" onclick="switchPage('rank')">排行榜</div>
  <div class="nav-item" onclick="switchPage('mine')">我的</div>
</div>

<!-- 打卡页 -->
<div class="page active" id="page-checkin">
  <div id="motivationBox" class="motivation"></div>
  <div class="user-select">
    <h3>选择你的名字</h3>
    <div class="user-grid" id="userGrid"></div>
  </div>
  <div class="checkin-area">
    <div class="today-status" id="todayStatus">请先选择名字</div>
    <button class="checkin-btn" id="checkinBtn" disabled onclick="doCheckin()">✅ 今天运动了！</button>
  </div>
</div>

<!-- 本周进度页 -->
<div class="page" id="page-progress">
  <div class="progress-card">
    <h3>本周完成情况（目标：4次）</h3>
    <div id="progressList"></div>
  </div>
  <div class="progress-card">
    <h3>📅 本周打卡日历</h3>
    <div id="weekCalendar"></div>
  </div>
</div>

<!-- 排行榜页 -->
<div class="page" id="page-rank">
  <div class="rank-card">
    <h3 style="font-size:15px;font-weight:600;color:#333;margin-bottom:12px;">🏆 累计排行榜</h3>
    <div id="rankList"></div>
  </div>
</div>

<!-- 我的页 -->
<div class="page" id="page-mine">
  <div class="my-card">
    <div class="section-title">选择查看谁的记录</div>
    <div class="user-grid" id="mineUserGrid"></div>
  </div>
  <div class="my-card" id="myStatsCard" style="display:none">
    <div class="my-stats" id="myStats"></div>
    <div class="section-title">近30天打卡日历</div>
    <div class="calendar-grid" id="myCalendar"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO = 'Echozhao95146/fitness-checkin';
const TOKEN = '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';
const DATA_FILE = 'data.json';
const API = `https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`;

const MOTIVATIONS = [
  '动起来！身体是革命的本钱 💪',
  '今天的汗水，是明天的健康存款 🔥',
  '歪马精神！为了30年后还能跑！',
  '打卡成功！你比昨天更好了 ⭐',
  '运动不止，岁月不老！继续加油 🚀',
  '坚持就是胜利，你做到了！🎉',
  '每一滴汗水都算数！💦',
  '为了健康工作30年，今天的你超棒！🌟',
];

let appData = { members: [], records: [] };
let fileSha = '';
let selectedUser = localStorage.getItem('lastUser') || '';
let mineSelected = '';

// 工具函数
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(str) {
  const [y,m,d] = str.split('-');
  return `${m}/${d}`;
}

function getWeekRange(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun
  const diffToSun = day === 0 ? 0 : -day;
  const sun = new Date(d); sun.setDate(d.getDate() + diffToSun);
  const sat = new Date(sun); sat.setDate(sun.getDate() + 6);
  const fmt = dt => `${dt.getMonth()+1}月${dt.getDate()}日`;
  return { start: toDateStr(sun), end: toDateStr(sat), label: `${fmt(sun)} ~ ${fmt(sat)}` };
}

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// 加载数据
async function loadData() {
  try {
    const r = await fetch(API + '?t=' + Date.now(), {
      headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    const j = await r.json();
    fileSha = j.sha;
    appData = JSON.parse(atob(j.content.replace(/\n/g,'')));
  } catch(e) {
    showToast('数据加载失败，请刷新重试');
  }
  render();
}

// 保存数据
async function saveData() {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(appData, null, 2))));
  const r = await fetch(API, {
    method: 'PUT',
    headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `打卡记录更新 ${today()}`, content, sha: fileSha })
  });
  const j = await r.json();
  if (j.content) { fileSha = j.content.sha; return true; }
  return false;
}

// 打卡
async function doCheckin() {
  if (!selectedUser) return;
  const t = today();
  const exists = appData.records.find(r => r.user === selectedUser && r.date === t);
  if (exists) { showToast('今天已经打卡了 ✅'); return; }

  document.getElementById('checkinBtn').disabled = true;
  document.getElementById('checkinBtn').textContent = '提交中...';

  appData.records.push({ user: selectedUser, date: t });
  appData.records.sort((a,b) => b.date.localeCompare(a.date));

  const ok = await saveData();
  if (ok) {
    localStorage.setItem('lastUser', selectedUser);
    const msg = MOTIVATIONS[Math.floor(Math.random() * MOTIVATIONS.length)];
    const box = document.getElementById('motivationBox');
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => { box.style.display = 'none'; }, 4000);
    showToast('打卡成功！💪');
    render();
  } else {
    appData.records = appData.records.filter(r => !(r.user === selectedUser && r.date === t));
    showToast('保存失败，请重试');
    render();
  }
}

function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = ['checkin','progress','rank','mine'].indexOf(name);
  document.querySelectorAll('.nav-item')[idx].classList.add('active');
  if (name === 'progress') renderProgress();
  if (name === 'rank') renderRank();
  if (name === 'mine' && mineSelected) renderMine(mineSelected);
}

function render() {
  const week = getWeekRange(today());
  document.getElementById('weekRange').textContent = week.label;
  renderCheckin();
}

function renderCheckin() {
  const grid = document.getElementById('userGrid');
  grid.innerHTML = '';
  appData.members.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'user-btn' + (m === selectedUser ? ' selected' : '');
    btn.textContent = m;
    btn.onclick = () => selectUser(m);
    grid.appendChild(btn);
  });
  updateCheckinStatus();
}

function selectUser(name) {
  selectedUser = name;
  renderCheckin();
}

function updateCheckinStatus() {
  const t = today();
  const done = selectedUser && appData.records.find(r => r.user === selectedUser && r.date === t);
  const btn = document.getElementById('checkinBtn');
  const status = document.getElementById('todayStatus');

  if (!selectedUser) {
    btn.disabled = true;
    btn.textContent = '✅ 今天运动了！';
    status.innerHTML = '请先选择名字';
    return;
  }
  if (done) {
    btn.disabled = true;
    btn.textContent = '今天已打卡 ✅';
    status.innerHTML = `<span class="done-badge">✅ 今天已完成打卡</span>`;
  } else {
    btn.disabled = false;
    btn.textContent = '✅ 今天运动了！';
    const week = getWeekRange(t);
    const cnt = appData.records.filter(r => r.user === selectedUser && r.date >= week.start && r.date <= week.end).length;
    status.innerHTML = `本周已完成 <b>${cnt}</b> / 4 次`;
  }
}

function renderProgress() {
  const week = getWeekRange(today());
  const list = document.getElementById('progressList');
  list.innerHTML = '';

  appData.members.forEach(m => {
    const cnt = appData.records.filter(r => r.user === m && r.date >= week.start && r.date <= week.end).length;
    const pct = Math.min(cnt / 4 * 100, 100);
    const isDone = cnt >= 4;
    list.innerHTML += `
      <div class="member-row">
        <div class="member-name">${m}</div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div class="progress-count ${isDone?'done':''}">${isDone?'✅':cnt+'/4'}</div>
      </div>`;
  });

  // 本周日历
  const cal = document.getElementById('weekCalendar');
  const days = ['日','一','二','三','四','五','六'];
  let html = days.map(d => `<div style="text-align:center;font-size:11px;color:#aaa;padding:4px 0">${d}</div>`).join('');

  const start = new Date(week.start);
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const ds = toDateStr(d);
    const checkers = appData.members.filter(m => appData.records.find(r => r.user === m && r.date === ds));
    const isToday = ds === today();
    const isFuture = ds > today();
    let cls = isFuture ? 'cal-day empty' : (checkers.length > 0 ? 'cal-day checked' : 'cal-day');
    if (isToday) cls += ' today';
    const tip = checkers.length > 0 ? `${checkers.length}人` : (isFuture ? '' : `${d.getDate()}`);
    html += `<div class="${cls}" title="${checkers.join(',')}">${isFuture ? d.getDate() : (checkers.length > 0 ? checkers.length+'人' : d.getDate())}</div>`;
  }
  cal.innerHTML = html;
  cal.style.display = 'grid';
  cal.style.gridTemplateColumns = 'repeat(7,1fr)';
  cal.style.gap = '6px';
}

function renderRank() {
  const list = document.getElementById('rankList');
  const totals = appData.members.map(m => {
    const cnt = appData.records.filter(r => r.user === m).length;
    // 连续天数
    const dates = [...new Set(appData.records.filter(r => r.user === m).map(r => r.date))].sort().reverse();
    let streak = 0;
    let cur = new Date(today());
    for (const d of dates) {
      const ds = toDateStr(cur);
      if (d === ds) { streak++; cur.setDate(cur.getDate()-1); }
      else if (d < ds) break;
    }
    return { name: m, cnt, streak };
  }).sort((a,b) => b.cnt - a.cnt || b.streak - a.streak);

  const medals = ['🥇','🥈','🥉'];
  const cls = ['gold','silver','bronze'];
  list.innerHTML = totals.map((t,i) => `
    <div class="rank-item">
      <div class="rank-no ${cls[i]||''}">${medals[i]||i+1}</div>
      <div class="rank-name">${t.name}</div>
      <div class="rank-streak">${t.streak>1?'🔥'+t.streak+'天':''}</div>
      <div class="rank-total">${t.cnt}次</div>
    </div>`).join('');
}

function renderMine(name) {
  mineSelected = name;
  // 更新选中状态
  document.querySelectorAll('#mineUserGrid .user-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === name);
  });

  const card = document.getElementById('myStatsCard');
  card.style.display = 'block';

  const allDates = [...new Set(appData.records.filter(r => r.user === name).map(r => r.date))].sort();
  const week = getWeekRange(today());
  const weekCnt = appData.records.filter(r => r.user === name && r.date >= week.start && r.date <= week.end).length;

  // 连续
  let streak = 0;
  let cur = new Date(today());
  const dateSet = new Set(allDates);
  while (dateSet.has(toDateStr(cur))) { streak++; cur.setDate(cur.getDate()-1); }

  document.getElementById('myStats').innerHTML = `
    <div class="stat-box"><div class="stat-num">${allDates.length}</div><div class="stat-label">累计打卡</div></div>
    <div class="stat-box"><div class="stat-num">${weekCnt}</div><div class="stat-label">本周次数</div></div>
    <div class="stat-box"><div class="stat-num">${streak}</div><div class="stat-label">连续天数</div></div>
  `;

  // 近30天日历
  const cal = document.getElementById('myCalendar');
  const headers = ['日','一','二','三','四','五','六'];
  let html = headers.map(d => `<div class="cal-header">${d}</div>`).join('');

  const end = new Date(today());
  const start30 = new Date(end); start30.setDate(end.getDate() - 29);
  const startDay = start30.getDay();
  for (let i = 0; i < startDay; i++) html += `<div class="cal-day empty"></div>`;

  for (let i = 0; i < 30; i++) {
    const d = new Date(start30); d.setDate(start30.getDate() + i);
    const ds = toDateStr(d);
    const isChecked = dateSet.has(ds);
    const isToday = ds === today();
    let cls = 'cal-day';
    if (isChecked) cls += ' checked';
    if (isToday) cls += ' today';
    html += `<div class="${cls}">${d.getDate()}</div>`;
  }
  cal.innerHTML = html;
}

// 初始化我的页面用户选择
function initMineGrid() {
  const grid = document.getElementById('mineUserGrid');
  grid.innerHTML = '';
  appData.members.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.textContent = m;
    btn.onclick = () => renderMine(m);
    grid.appendChild(btn);
  });
}

// 启动
loadData().then(() => {
  initMineGrid();
  if (selectedUser && appData.members.includes(selectedUser)) {
    document.querySelectorAll('#userGrid .user-btn').forEach(b => {
      if (b.textContent === selectedUser) b.classList.add('selected');
    });
    updateCheckinStatus();
  }
});
</script>
</body>
</html>
